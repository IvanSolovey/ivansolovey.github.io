<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=Unbounded:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<meta name="twitter:card" content="summary_large_image">
{% seo %}
{% if page.layout == 'post' %}
  {% assign _og_image = site.url | append: "/assets/og/" | append: page.slug | append: ".png" %}
{% else %}
  {% assign _og_image = site.url | append: "/assets/og/og-static.png" %}
{% endif %}
<meta property="og:image" content="{{ _og_image }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{ page.title | default: site.title }}">
<meta name="twitter:image" content="{{ _og_image }}">
<script>
  (function(){
    var t = localStorage.getItem('theme-mode') || 'auto';
    var dark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  })();
</script>
