title: Соловей
description: Про AI, менеджмент і особисту ефективність
url: "https://ivansolovey.github.io"
baseurl: ""
lang: uk
locale: uk_UA

author:
  name: Іван Соловйов

# --- Plugins ---
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# --- Pagination ---
paginate: 10
paginate_path: "/page:num/"

# --- Permalinks ---
permalink: /:year/:month/:slug/

# --- Collections ---
collections:
  pages:
    output: true
    permalink: /:name/

# --- Defaults ---
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# --- Giscus comments ---
# Fill in after setting up at https://giscus.app
giscus:
  repo: "ivansolovey/ivansolovey.github.io"          # e.g. "ivansolovey/ivansolovey.github.io"
  repo_id: "R_kgDOSf1DaQ"
  category: "Announcements"
  category_id: "DIC_kwDOSf1Dac4C9PFS"

# --- Email subscription (Google Apps Script Web App URL) ---
# Fill in after deploying Apps Script (see email-subscription/setup/README.md)
subscribe_webapp_url: "https://script.google.com/macros/s/AKfycbyI5cH0rajX9NmesArva_VfALtnu3FaxrsXlaM1TsDqe1bv23_wjJWDJwrOjjtLiBUFYA/exec"

# --- Exclude from build ---
exclude:
  - PLAN.md
  - design-brief.md
  - brief-for-claude-code.md
  - email-subscription/
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - README.md
